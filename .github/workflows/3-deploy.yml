name: 3 - Continuous Deployment
run-name: "${{ github.workflow }}"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., dev or a specific commit SHA)"
        required: true
  workflow_run:
    workflows: ["2 - Continuous Delivery"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  WEB_IMAGE_NAME: secure-doc-platform-web
  DB_IMAGE_NAME: secure-doc-platform-db

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image namespace
        run: |
          echo "IMAGE_NAMESPACE_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Resolve image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          fi

      - name: Run dynamic API security tests
        working-directory: tests
        run: |
          pytest -v tests_dynamic

      - name: Show deployment target
        run: |
          WEB_IMAGE="$REGISTRY/$IMAGE_NAMESPACE_LC/$WEB_IMAGE_NAME:$IMAGE_TAG"
          DB_IMAGE="$REGISTRY/$IMAGE_NAMESPACE_LC/$DB_IMAGE_NAME:$IMAGE_TAG"
          echo "Deploying WEB_IMAGE=$WEB_IMAGE"
          echo "Deploying DB_IMAGE=$DB_IMAGE"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull deployment images
        run: |
          WEB_IMAGE="$REGISTRY/$IMAGE_NAMESPACE_LC/$WEB_IMAGE_NAME:$IMAGE_TAG"
          DB_IMAGE="$REGISTRY/$IMAGE_NAMESPACE_LC/$DB_IMAGE_NAME:$IMAGE_TAG"
          docker pull "$WEB_IMAGE"
          docker pull "$DB_IMAGE"

      - name: Stop existing deployment
        run: |
          docker compose -f docker-compose.deploy.yml down || true

      - name: Start deployment
        run: |
          WEB_IMAGE="$REGISTRY/$IMAGE_NAMESPACE_LC/$WEB_IMAGE_NAME:$IMAGE_TAG"
          DB_IMAGE="$REGISTRY/$IMAGE_NAMESPACE_LC/$DB_IMAGE_NAME:$IMAGE_TAG"
          export WEB_IMAGE DB_IMAGE
          docker compose -f docker-compose.deploy.yml up -d

      - name: Wait for application
        run: |
          timeout=60
          elapsed=0

          until curl -kfs https://localhost:8000/health > /dev/null; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Application did not become ready within ${timeout}s"
              exit 1
            fi

            echo "Waiting for application..."
            sleep 2
            elapsed=$((elapsed+2))
          done

          echo "Application is ready"

      - name: Verify deployment health
        run: |
          curl -kf https://localhost:8000/health

      - name: Promote deployed images to prod
        if: success()
        run: |
          WEB_IMAGE="$REGISTRY/$IMAGE_NAMESPACE_LC/$WEB_IMAGE_NAME:$IMAGE_TAG"
          DB_IMAGE="$REGISTRY/$IMAGE_NAMESPACE_LC/$DB_IMAGE_NAME:$IMAGE_TAG"
          docker tag "$WEB_IMAGE" "$REGISTRY/$IMAGE_NAMESPACE_LC/$WEB_IMAGE_NAME:prod"
          docker tag "$DB_IMAGE" "$REGISTRY/$IMAGE_NAMESPACE_LC/$DB_IMAGE_NAME:prod"

          docker push "$REGISTRY/$IMAGE_NAMESPACE_LC/$WEB_IMAGE_NAME:prod"
          docker push "$REGISTRY/$IMAGE_NAMESPACE_LC/$DB_IMAGE_NAME:prod"

      - name: Trigger Render deploy
        if: success()
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "No RENDER_DEPLOY_HOOK_URL secret set — skipping Render deploy trigger."
          else
            echo "Triggering Render deploy hook..."
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL" || echo "Render hook call failed"
          fi

      - name: Show deployed container status on failure
        if: failure()
        run: |
          docker compose -f docker-compose.deploy.yml ps

      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.deploy.yml logs