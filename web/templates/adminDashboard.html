{% extends "base.html" %}

{% block content %}

<h2>Admin Dashboard</h2>

<section class="grid">

    <div class="card">
        <h2>Users</h2>

        {% if users %}
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Disabled</th>
            </tr>
            </thead>

            <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>
                    {% if user.is_disabled %}
                    <span style="color:red;">Yes</span>
                    {% else %}
                    <span style="color:green;">No</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
            </tbody>
        </table>

        {% else %}
        <p>No users found.</p>
        {% endif %}

    </div>

</section>

{% endblock %}
