services:
  web:
    build: ./web
    ports:
      - "8000"
    volumes:
      - ./web:/app
    depends_on:
      - db

  nginx:
    image: nginx:latest
    ports:
      - "8000:443"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/certs:/etc/nginx/certs:ro
    depends_on:
      - web

  db:
    build: ./db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
